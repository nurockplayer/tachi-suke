name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify static site
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Reject forbidden lockfiles
        run: |
          test ! -f package-lock.json
          test ! -f yarn.lock
          test ! -f bun.lock
          test ! -f bun.lockb

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run source tests
        run: pnpm test

      - name: Build static site
        run: pnpm build

      - name: Check built internal links
        run: pnpm check:links

      - name: Check built SEO output
        run: pnpm check:seo
